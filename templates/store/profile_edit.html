{% extends 'base.html' %}
{% block title %}Редактирование профиля{% endblock %}
{% block content %}
<h1>Редактирование профиля</h1>
<div class="row">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field.errors }}
                {% if field.field.widget.input_type == 'textarea' %}
                <textarea name="{{ field.name }}" class="form-control" rows="2">{{ field.value|default:'' }}</textarea>
                {% else %}
                <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.name }}" class="form-control" value="{{ field.value|default:'' }}">
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
