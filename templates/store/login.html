{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h1 class="mb-4">Вход</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control">
            </div>
            {% endfor %}
            {% if form.errors %}<div class="alert alert-danger">Неверный логин или пароль</div>{% endif %}
            <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
        <p class="mt-3">Нет аккаунта? <a href="{% url 'signup' %}">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
